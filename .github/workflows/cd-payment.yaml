# =============================================================================
# CD — payment-service
# Secret requis : RENDER_PAYMENT_DEPLOY_HOOK
# =============================================================================

name: CD — payment-service

on:
  push:
    branches: [main]
    paths:
      - "services/payment/**"
      - ".github/workflows/cd-payment.yaml"

concurrency:
  group: cd-payment-production
  cancel-in-progress: false

jobs:

  deploy:
    name: Deploy payment-service → Render
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build Docker Image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success
      - name: Trigger Render Deploy Hook
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_PAYMENT_DEPLOY_HOOK }}")
          echo "Render responded with HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then exit 1; fi
      - name: Wait for payment-service health check
        run: |
          for i in $(seq 1 20); do
            HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 10 "https://ecom-watch-payment.onrender.com/health" || echo "000")
            if [ "$HTTP" = "200" ]; then exit 0; fi
            echo "Attempt $i/20 — HTTP $HTTP — next in 15s"; sleep 15
          done; exit 1
      - name: Deployment summary
        if: success()
        run: echo "### payment-service déployé ✅" >> $GITHUB_STEP_SUMMARY