# =============================================================================
# WORKFLOW : Intégration Continue — Globale (Root CI)
#
# Ce workflow remplace l'ancien CI du monolithe, désormais migré en microservices.
# Chaque service dispose de son propre CI dans services/<service>/.github/workflows/.
# Ce workflow root couvre les vérifications transversales qu'aucun CI de service
# ne peut faire seul.
#
# Pipeline :
#   validate-gateway  — valide la config Nginx avec toutes les variables
#                       de tous les services (y compris admin-service)
#   validate-compose  — vérifie que docker-compose.yml est syntaxiquement valide
#
# Déclencheurs :
#   Tout push/PR sur main ou develop, sur les fichiers cross-cutting :
#     - gateway/**       → config Nginx impacte tous les services
#     - docker-compose.yml
#     - .github/workflows/CI.yaml (ce fichier)
#
# Les CIs individuels (ci-auth.yaml, ci-product.yaml, etc.) continuent
# de s'exécuter sur leurs paths respectifs de façon indépendante.
# =============================================================================

name: CI — Global

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/CI.yaml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/CI.yaml"

# Annule les runs en cours si un nouveau commit arrive sur la même branche.
concurrency:
  group: ci-global-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 : VALIDATION DE LA CONFIG NGINX (GATEWAY)
  #
  # Simule exactement ce que fait entrypoint.sh en production :
  #   1. envsubst remplace TOUTES les variables connues avec des valeurs fictives
  #   2. nginx -t valide la syntaxe et les upstreams
  #
  # IMPORTANT : Cette liste de variables DOIT être maintenue à jour à chaque
  # ajout d'un nouveau service routé par le Gateway.
  #
  # Services actuellement routés :
  #   auth, order, product, payment, cart  → routes publiques exposées
  #   admin                                → routes /api/v1/admin/* (ajouté)
  #   notification                         → aucune route publique (interne)
  # ---------------------------------------------------------------------------
  validate-gateway:
    name: Validate Nginx Config (Gateway)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Nginx config avec envsubst complet
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/gateway/nginx:/etc/nginx/src:ro \
            -e PORT=8080 \
            -e MONOLITH_URL=ecom-watch.onrender.com \
            -e FRONTEND_DOMAIN=ecomwatch.vercel.app \
            -e AUTH_SERVICE_HOST=ecom-watch-auth.onrender.com \
            -e ORDER_SERVICE_HOST=ecom-watch-order.onrender.com \
            -e PRODUCT_SERVICE_HOST=ecom-watch-product.onrender.com \
            -e PAYMENT_SERVICE_HOST=ecom-watch-payment.onrender.com \
            -e CART_SERVICE_HOST=ecom-watch-cart.onrender.com \
            -e NOTIFICATION_SERVICE_HOST=ecom-watch-notification.onrender.com \
            -e ADMIN_SERVICE_HOST=ecom-watch-admin.onrender.com \
            nginx:1.25-alpine sh -c '
              set -e

              mkdir -p /tmp/nginx/conf.d

              # Substitution complète de toutes les variables connues
              VARS="${PORT} ${MONOLITH_URL} ${FRONTEND_DOMAIN} ${AUTH_SERVICE_HOST} ${ORDER_SERVICE_HOST} ${PRODUCT_SERVICE_HOST} ${PAYMENT_SERVICE_HOST} ${CART_SERVICE_HOST} ${NOTIFICATION_SERVICE_HOST} ${ADMIN_SERVICE_HOST}"

              envsubst "$VARS" \
                < /etc/nginx/src/nginx.conf > /tmp/nginx/nginx.conf

              envsubst "$VARS" \
                < /etc/nginx/src/conf.d/default.conf > /tmp/nginx/conf.d/default.conf

              cp /etc/nginx/src/conf.d/proxy_params.conf /tmp/nginx/conf.d/proxy_params.conf

              # Détecte les variables non substituées (oubli dans la liste VARS)
              if grep -rE "\$\{[A-Z_]+\}" /tmp/nginx/; then
                echo "ERREUR : des variables non substituées dans la config Nginx"
                echo "Ajouter la variable manquante dans le step ci-dessus ET dans gateway/docker/entrypoint.sh"
                exit 1
              fi

              nginx -t -c /tmp/nginx/nginx.conf
              echo "Config Nginx valide — tous les upstreams sont résolus"
            '

  # ---------------------------------------------------------------------------
  # JOB 2 : VALIDATION DU DOCKER-COMPOSE
  #
  # Vérifie que docker-compose.yml est syntaxiquement valide.
  # Utile pour le développement local : évite de pousser un compose cassé.
  # ---------------------------------------------------------------------------
  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose config --quiet
        env:
          # Variables requises par docker-compose.yml pour la validation à sec
          # (valeurs fictives — aucun container n'est démarré ici)
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
          JWT_ACCESS_SECRET: ci-secret
          JWT_REFRESH_SECRET: ci-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CLIENT_URL: http://localhost:5173