# ================================================================
# CI — Order Service
# ================================================================

name: CI — Order Service

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "services/order/**"
      - ".github/workflows/ci-order.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/order/**"

concurrency:
  group: ci-order-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  WORKING_DIR: ./services/order

jobs:

  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Check Node.js syntax
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          find src -name "*.js" | xargs node --check
          echo "Syntaxe OK"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Run unit tests with coverage
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:coverage
        env:
          NODE_ENV: test
          PORT: 3004
          DATABASE_URL: postgresql://fake:fake@localhost/fake
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-not-for-production
          INTERNAL_ORDER_SECRET: ci-order-secret-not-for-production
          INTERNAL_AUTH_SECRET: ci-auth-secret-not-for-production
          CLIENT_URL: http://localhost:5173
          RESEND_API_KEY: re_test_placeholder
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-order-service
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Enable uuid-ossp extension
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_order_db \
            -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Create "order" schema
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_order_db \
            -c 'CREATE SCHEMA IF NOT EXISTS "order";'
      - name: Run migration 001
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_order_db \
            -v ON_ERROR_STOP=1 \
            -f ${{ env.WORKING_DIR }}/migrations/001_order_schema.sql
      - name: Run migration 002
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_order_db \
            -v ON_ERROR_STOP=1 \
            -f ${{ env.WORKING_DIR }}/migrations/002_order_indexes.sql
      - name: Run integration tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:run -- --reporter=verbose
        env:
          NODE_ENV: test
          PORT: 3004
          DATABASE_URL: postgresql://test_user:test_password@localhost/test_order_db?options=--search_path%3D%22order%22
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-not-for-production
          INTERNAL_ORDER_SECRET: ci-order-secret-not-for-production
          INTERNAL_AUTH_SECRET: ci-auth-secret-not-for-production
          CLIENT_URL: http://localhost:5173
          RESEND_API_KEY: re_test_placeholder

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build order-service image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: false
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,mode=max,scope=order-service
          tags: ecom-watch-order-service:ci