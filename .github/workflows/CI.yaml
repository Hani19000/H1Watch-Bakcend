# =============================================================================
# WORKFLOW : CI global — ECOM-WATCH Monorepo
#
# Ce fichier est conservé pour les vérifications globales (gateway, lint racine).
# Chaque microservice a son propre workflow CI dédié avec filtres de chemin :
#   ci-auth.yaml      → services/auth/**
#   ci-products.yaml  → services/products/**
#   ci-order.yaml     → services/order/**
#   ci-payment.yaml   → services/payment/**
#   ci-cart.yaml      → services/cart/**
#   ci-gateway.yaml   → gateway/**
#
# Le monolith a été supprimé — ce fichier ne lance plus ses tests.
# =============================================================================

name: CI — Global

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-global-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Validation rapide que le repo reste cohérent (pas de lock files en conflit, etc.)
  sanity-check:
    name: Sanity Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Vérification de la structure du monorepo
        run: |
          echo "Services présents :"
          ls services/
          echo "Gateway présent :"
          ls gateway/
          echo "Workflows CI présents :"
          ls .github/workflows/ci-*.yaml
          echo "Workflows CD présents :"
          ls .github/workflows/cd-*.yaml