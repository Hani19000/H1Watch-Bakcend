# =============================================================================
# WORKFLOW : Déploiement Continu — admin-service
#
# Déclenché uniquement sur les pushs vers main touchant le service admin,
# et uniquement si la CI est passée (needs: ci).
#
# Pipeline :
#   deploy   — déclenche le redéploiement du service Render via deploy hook
#              puis vérifie la disponibilité du /health
#
# Infrastructure cible :
#   API      — Render Web Service (port 3008, build interne depuis GitHub)
#   Cache    — Render Redis ou Upstash (injecté via REDIS_URL)
#   Pas de base de données propre — l'admin-service est un agrégateur HTTP.
#   Pas de migration SQL à appliquer.
#
# Secrets GitHub requis (Settings > Secrets and variables > Actions) :
#   RENDER_ADMIN_DEPLOY_HOOK_URL  — URL du deploy hook Render du admin-service
#                                   (Render dashboard > admin-service > Settings > Deploy Hook)
#   RENDER_ADMIN_SERVICE_URL      — URL publique du service déployé
#                                   (ex: https://ecom-watch-admin.onrender.com)
#
# Ces deux secrets sont isolés du monolithe pour éviter tout déploiement croisé.
# =============================================================================

name: CD — admin-service

on:
  push:
    branches:
      - main
    paths:
      - 'services/admin/**'
      - '.github/workflows/CD-admin.yaml'

# Un seul déploiement à la fois.
# cancel-in-progress: false — on ne coupe pas un déploiement en cours
# pour éviter de laisser le service dans un état intermédiaire.
concurrency:
  group: cd-admin-production
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 : DÉPLOIEMENT RENDER
  #
  # L'admin-service n'a pas de base de données propre.
  # Aucune migration SQL n'est nécessaire avant le déploiement.
  #
  # Render récupère le dernier commit de main, rebuild l'image Docker
  # depuis services/admin/Dockerfile et redémarre le service.
  #
  # Le deploy hook est une URL HTTPS unique générée par Render.
  # Elle ne nécessite pas d'authentification supplémentaire — la garder secrète.
  #
  #   Render Dashboard > admin-service > Settings > Deploy Hook > Create
  # ---------------------------------------------------------------------------
  deploy:
    name: Déploiement Render — admin-service
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Déclenchement du deploy hook Render
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_ADMIN_DEPLOY_HOOK_URL }}")

          echo "Statut HTTP retourné par Render : $HTTP_STATUS"

          # Render retourne 201 Created lorsque le déploiement est bien enregistré.
          # Tout autre code (4xx, 5xx) est une erreur bloquante.
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Erreur : Render n'a pas accepté le deploy hook (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "Déploiement déclenché avec succès."

      # -----------------------------------------------------------------------
      # Attend que le service soit opérationnel en interrogeant /health.
      #
      # L'admin-service démarre le serveur HTTP AVANT les cron jobs (server.js).
      # Le /health répond immédiatement avec { service: "admin-service", status: "ok" }
      # sans dépendre de la disponibilité des services aval (auth, order, product).
      # Un état "degraded" des services aval n'empêche pas le démarrage.
      #
      # Render peut prendre jusqu'à 3-5 minutes pour un cold start sur le plan gratuit.
      # MAX_ATTEMPTS=24 × WAIT_SECONDS=15 = 6 minutes de polling maximum.
      # -----------------------------------------------------------------------
      - name: Attente de la disponibilité du admin-service
        run: |
          SERVICE_URL="${{ secrets.RENDER_ADMIN_SERVICE_URL }}"
          MAX_ATTEMPTS=24
          WAIT_SECONDS=15

          echo "Vérification de $SERVICE_URL/health (max ${MAX_ATTEMPTS} tentatives × ${WAIT_SECONDS}s)"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 10 \
              "$SERVICE_URL/health" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "admin-service opérationnel après $i tentative(s) (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "Tentative $i/$MAX_ATTEMPTS — HTTP ${HTTP_STATUS} — prochaine dans ${WAIT_SECONDS}s"
            sleep $WAIT_SECONDS
          done

          echo "Échec : admin-service ne répond pas après $((MAX_ATTEMPTS * WAIT_SECONDS)) secondes"
          exit 1

      # -----------------------------------------------------------------------
      # Résumé visible dans l'interface GitHub Actions après chaque déploiement.
      # -----------------------------------------------------------------------
      - name: Résumé du déploiement
        if: success()
        run: |
          echo "### ✅ Déploiement admin-service réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ       | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service     | \`admin-service\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit      | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auteur      | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche     | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Message     | ${{ github.event.head_commit.message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL         | ${{ secrets.RENDER_ADMIN_SERVICE_URL }} |" >> $GITHUB_STEP_SUMMARY

      - name: Résumé en cas d'échec
        if: failure()
        run: |
          echo "### ❌ Déploiement admin-service échoué" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ   | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auteur  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Consulter les logs Render pour identifier la cause de l'échec." >> $GITHUB_STEP_SUMMARY
