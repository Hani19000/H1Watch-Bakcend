# ================================================================
# CI — Cart Service
# ================================================================

name: CI — Cart Service

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "services/cart/**"
      - ".github/workflows/ci-cart.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/cart/**"

concurrency:
  group: ci-cart-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/cart

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/cart/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Les tests cart mockent toutes les dépendances (DB, Redis, product-service).
      # Les variables ci-dessous satisfont la validation de environment.js sans
      # déclencher de vrais appels réseau.
      - name: Run unit tests
        run: npm test -- --run
        env:
          NODE_ENV: test
          PORT: 3006
          JWT_ACCESS_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_cart
          REDIS_URL: redis://localhost:6379
          PRODUCT_SERVICE_URL: http://localhost:3003
          INTERNAL_PRODUCT_SECRET: ci-product-secret-not-for-production

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build cart-service image
        uses: docker/build-push-action@v5
        with:
          context: services/cart
          file: services/cart/Dockerfile
          push: false
          cache-from: type=gha,scope=cart-service
          cache-to: type=gha,mode=max,scope=cart-service
          tags: ecom-watch-cart-service:ci