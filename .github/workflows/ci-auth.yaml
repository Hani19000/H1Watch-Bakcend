# =============================================================================
# CI — auth-service
#
# Déclenché uniquement si services/auth/** est modifié.
# Pipeline : lint → unit-tests → integration-tests → build Docker
# =============================================================================

name: CI — auth-service

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "services/auth/**"
      - ".github/workflows/ci-auth.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/auth/**"
      - ".github/workflows/ci-auth.yaml"

concurrency:
  group: ci-auth-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  WORKING_DIR: ./services/auth

jobs:

  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Check Node.js syntax
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          find src -name "*.js" | xargs node --check
          echo "Syntaxe OK"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:coverage
        env:
          NODE_ENV: test
          PORT: 3002
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only_not_production
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only_not_production
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CLIENT_URL: http://localhost:5173
          ORDER_SERVICE_URL: http://localhost:3003
          INTERNAL_SECRET: test_internal_secret_ci
          DATABASE_URL: postgresql://fake:fake@localhost/fake
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-auth-service
          path: ${{ env.WORKING_DIR }}/coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci
      - name: Setup auth schema
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_auth_db \
            -c "CREATE SCHEMA IF NOT EXISTS auth;"
      - name: Run migrations
        run: |
          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_auth_db \
            -v ON_ERROR_STOP=1 \
            -f ${{ env.WORKING_DIR }}/migrations/001_auth_schema.sql

          PGPASSWORD=test_password psql \
            -h localhost -U test_user -d test_auth_db \
            -v ON_ERROR_STOP=1 \
            -f ${{ env.WORKING_DIR }}/migrations/002_indexes.sql
      - name: Run integration tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:run -- --reporter=verbose
        env:
          NODE_ENV: test
          PORT: 3002
          DATABASE_URL: postgresql://test_user:test_password@localhost/test_auth_db?options=--search_path%3Dauth
          JWT_ACCESS_SECRET: test_access_secret_for_ci_only_not_production
          JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only_not_production
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          CLIENT_URL: http://localhost:5173
          ORDER_SERVICE_URL: http://localhost:3003
          INTERNAL_SECRET: test_internal_secret_ci

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          file: ${{ env.WORKING_DIR }}/Dockerfile
          push: false
          cache-from: type=gha,scope=auth-service
          cache-to: type=gha,mode=max,scope=auth-service
          tags: ecom-watch-auth-service:ci