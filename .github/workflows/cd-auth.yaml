# =============================================================================
# CD — auth-service
# Déploie sur Render via Deploy Hook après passage du CI.
# Secret requis : RENDER_AUTH_DEPLOY_HOOK
# =============================================================================

name: CD — auth-service

on:
  push:
    branches: [main]
    paths:
      - "services/auth/**"
      - ".github/workflows/cd-auth.yaml"

concurrency:
  group: cd-auth-production
  cancel-in-progress: false

jobs:

  deploy:
    name: Deploy auth-service → Render
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Attend que le CI (Build Docker Image) soit passé sur ce SHA avant de déployer.
      - name: Wait for CI to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build Docker Image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      - name: Trigger Render Deploy Hook
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_AUTH_DEPLOY_HOOK }}")

          echo "Render responded with HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deploy triggered successfully"

      - name: Deployment summary
        if: success()
        run: |
          echo "### auth-service déployé ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Auteur** : ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY