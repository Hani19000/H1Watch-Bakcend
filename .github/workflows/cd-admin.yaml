# =============================================================================
# CD — admin-service
#
# Déclenché uniquement sur push main touchant services/admin/**,
# après passage de la CI (needs: ci dans le même commit).
#
# Secrets requis :
#   RENDER_ADMIN_DEPLOY_HOOK_URL  → deploy hook Render de l'admin-service
#   RENDER_GATEWAY_URL            → URL publique du Gateway (health check final)
# =============================================================================

name: CD — admin-service

on:
  push:
    branches: [main]
    paths:
      - 'services/admin/**'
      - '.github/workflows/cd-admin.yaml'

concurrency:
  group: cd-admin-production
  cancel-in-progress: false

jobs:

  deploy:
    name: Déploiement Render — admin-service
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Déclenchement du deploy hook Render
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_ADMIN_DEPLOY_HOOK_URL }}")

          echo "Statut HTTP retourné par Render : $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Erreur : Render n'a pas accepté le deploy hook (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "Déploiement déclenché avec succès."

      # Le Gateway est le seul point d'entrée public de l'API.
      # Son /health confirme que la chaîne complète (gateway → admin-service) est opérationnelle.
      # Render peut prendre jusqu'à 3-5 min pour un cold start (plan gratuit).
      - name: Attente de la disponibilité du Gateway
        run: |
          GATEWAY_URL="${{ secrets.RENDER_GATEWAY_URL }}"
          MAX_ATTEMPTS=24
          WAIT_SECONDS=15

          echo "Vérification de $GATEWAY_URL/health (max ${MAX_ATTEMPTS} tentatives × ${WAIT_SECONDS}s)"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 10 \
              "$GATEWAY_URL/health" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Gateway opérationnel après $i tentative(s) (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "Tentative $i/$MAX_ATTEMPTS — HTTP ${HTTP_STATUS} — prochaine dans ${WAIT_SECONDS}s"
            sleep $WAIT_SECONDS
          done

          echo "Échec : Gateway ne répond pas après $((MAX_ATTEMPTS * WAIT_SECONDS)) secondes"
          exit 1

      - name: Résumé du déploiement
        if: success()
        run: |
          echo "### ✅ Déploiement admin-service réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ   | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`admin-service\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auteur  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | ${{ secrets.RENDER_GATEWAY_URL }}/health |" >> $GITHUB_STEP_SUMMARY

      - name: Résumé en cas d'échec
        if: failure()
        run: |
          echo "### ❌ Déploiement admin-service échoué" >> $GITHUB_STEP_SUMMARY
          echo "Commit : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Consulter les logs Render pour identifier la cause de l'échec." >> $GITHUB_STEP_SUMMARY