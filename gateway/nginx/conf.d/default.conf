server {
    listen      ${PORT};
    server_name _;

    client_max_body_size 10M;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Max-Age;

    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Request-ID" always;
    add_header Access-Control-Max-Age           "86400" always;
    add_header X-Gateway                        "ecom-watch" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"api-gateway","version":"2.0.0"}';
    }

    # /internal/* bloqué sur Internet — réseau interne Render uniquement.
    location ~ ^/internal/ {
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────────
    # AUTH-SERVICE
    # ─────────────────────────────────────────────────────────────────────

    location ~ ^/(api/v1/)?auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://auth_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${AUTH_SERVICE_HOST};
        proxy_set_header Host ${AUTH_SERVICE_HOST};
    }

    location ~ ^/(api/v1/)?auth/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://auth_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${AUTH_SERVICE_HOST};
        proxy_set_header Host ${AUTH_SERVICE_HOST};
    }

    location ~ ^/(api/v1/)?users(/|$) {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://auth_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${AUTH_SERVICE_HOST};
        proxy_set_header Host ${AUTH_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # ADMIN-SERVICE — /api/v1/admin/*
    #
    # Déclaré AVANT order-service et product-service pour éviter tout conflit.
    # La sécurité repose sur le JWT + rôle ADMIN validés côté admin-service.
    # Le gateway ne vérifie pas le rôle — il route uniquement.
    # ─────────────────────────────────────────────────────────────────────

    location ~ ^/(api/v1/)?admin(/|$) {
        limit_req zone=admin burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://admin_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ADMIN_SERVICE_HOST};
        proxy_set_header Host ${ADMIN_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # ORDER-SERVICE  (/orders, /shipping, /taxes)
    #
    # /shipping et /taxes sont des modules de l'order-service (même processus,
    # même port). Ils doivent être déclarés ici aux côtés de /orders.
    # Leur absence causait un 404 gateway sans header CORS, ce qui
    # provoquait une double erreur (CORS bloquée + 404) côté navigateur.
    # ─────────────────────────────────────────────────────────────────────

    location ~ ^/(api/v1/)?orders/track-guest {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://order_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORDER_SERVICE_HOST};
        proxy_set_header Host ${ORDER_SERVICE_HOST};
    }

    location ~ ^/(api/v1/)?orders(/|$) {
        limit_req zone=order burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://order_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORDER_SERVICE_HOST};
        proxy_set_header Host ${ORDER_SERVICE_HOST};
    }

    # Routes frais de port — publiques (calculate, rates, track) + admin (shipments)
    # Montées dans order-service/src/routes/index.routes.js sous /api/v1/shipping
    location ~ ^/(api/v1/)?shipping(/|$) {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://order_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORDER_SERVICE_HOST};
        proxy_set_header Host ${ORDER_SERVICE_HOST};
    }

    # Routes taxes — toutes publiques (rates, calculate, countries, check-exemption)
    # Montées dans order-service/src/routes/index.routes.js sous /api/v1/taxes
    location ~ ^/(api/v1/)?taxes(/|$) {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://order_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${ORDER_SERVICE_HOST};
        proxy_set_header Host ${ORDER_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # PRODUCT-SERVICE
    # ─────────────────────────────────────────────────────────────────────

    location ~ ^/(api/v1/)?(products|categories|promotions|inventory)(/|$) {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://product_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${PRODUCT_SERVICE_HOST};
        proxy_set_header Host ${PRODUCT_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # PAYMENT-SERVICE
    # ─────────────────────────────────────────────────────────────────────

    # Webhook Stripe — pas de rate limit, authentifié par signature HMAC.
    # proxy_read_timeout à 35s : Stripe exige une réponse dans les 30s.
    location ~ ^/(api/v1/)?payments/webhook/stripe {
        proxy_pass https://payment_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${PAYMENT_SERVICE_HOST};
        proxy_set_header Host              ${PAYMENT_SERVICE_HOST};
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     35s;
        proxy_http_version     1.1;
        proxy_set_header Connection "";
    }

    location ~ ^/(api/v1/)?payments/create-session/ {
        limit_req zone=payment burst=5 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://payment_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${PAYMENT_SERVICE_HOST};
        proxy_set_header Host ${PAYMENT_SERVICE_HOST};
    }

    location ~ ^/(api/v1/)?payments/status/ {
        limit_req zone=order burst=30 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://payment_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${PAYMENT_SERVICE_HOST};
        proxy_set_header Host ${PAYMENT_SERVICE_HOST};
    }

    location ~ ^/(api/v1/)?payments/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://payment_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${PAYMENT_SERVICE_HOST};
        proxy_set_header Host ${PAYMENT_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # CART-SERVICE
    # ─────────────────────────────────────────────────────────────────────

    location ~ ^/(api/v1/)?cart {
        limit_req zone=cart burst=20 nodelay;
        limit_req_status 429;
        include /tmp/nginx/conf.d/proxy_params.conf;
        proxy_pass https://cart_service;
        proxy_ssl_server_name on;
        proxy_ssl_name ${CART_SERVICE_HOST};
        proxy_set_header Host ${CART_SERVICE_HOST};
    }

    # ─────────────────────────────────────────────────────────────────────
    # FALLBACK — 404
    # Toute route non gérée retourne 404.
    # ─────────────────────────────────────────────────────────────────────
    location / {
        add_header Content-Type application/json always;
        return 404 '{"status":"error","message":"Route non trouvée"}';
    }
}