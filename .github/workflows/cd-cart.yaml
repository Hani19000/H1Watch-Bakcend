# =============================================================================
# CD — cart-service
# Pipeline : migrate (Neon) → deploy (Render)
# Secrets requis : NEON_DATABASE_URL_CART, RENDER_DEPLOY_HOOK_CART_URL, CART_SERVICE_URL
# =============================================================================

name: CD — cart-service

on:
  push:
    branches: [main]
    paths:
      - "services/cart/**"
      - ".github/workflows/cd-cart.yaml"

concurrency:
  group: cd-cart-production
  cancel-in-progress: false

jobs:

  migrate:
    name: Migration Neon — schéma cart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installation du client psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: Vérification de la connexion Neon
        run: psql "${{ secrets.NEON_DATABASE_URL_CART }}" -c "SELECT current_user, current_database();"
      - name: Migration 000 — schéma cart
        run: |
          psql "${{ secrets.NEON_DATABASE_URL_CART }}" \
            -f services/cart/migrations/000_neon_add_cart.sql
      - name: Vérification post-migration
        run: |
          psql "${{ secrets.NEON_DATABASE_URL_CART }}" -c \
            "SELECT tablename FROM pg_tables WHERE schemaname = 'cart' ORDER BY tablename;"

  deploy:
    name: Déploiement Render — cart-service
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - name: Déclenchement du deploy hook Render
        run: |
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request POST "${{ secrets.RENDER_DEPLOY_HOOK_CART_URL }}")
          echo "Statut HTTP : $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "202" ]; then exit 1; fi
      - name: Attente de la disponibilité du cart-service
        run: |
          SERVICE_URL="${{ secrets.CART_SERVICE_URL }}"
          for i in $(seq 1 20); do
            HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 10 "$SERVICE_URL/health" || echo "000")
            if [ "$HTTP" = "200" ]; then echo "cart-service opérationnel après $i tentative(s)"; exit 0; fi
            echo "Tentative $i/20 — HTTP $HTTP — prochaine dans 15s"; sleep 15
          done; exit 1
      - name: Résumé du déploiement
        if: success()
        run: echo "### cart-service déployé ✅" >> $GITHUB_STEP_SUMMARY