# =============================================================================
# CI — Gateway
#
# Déclenché uniquement si gateway/** est modifié.
# Pipeline : validate (Nginx config) → build Docker
#
# Le job validate simule exactement entrypoint.sh en production.
# RÈGLE : ajouter un service = ajouter sa variable ici ET dans entrypoint.sh.
#
# CORRECTION : ADMIN_SERVICE_HOST ajouté à l'envsubst pour valider
# l'upstream admin_service déclaré dans nginx.conf.
# =============================================================================

name: CI — Gateway

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "gateway/**"
      - ".github/workflows/ci-gateway.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "gateway/**"
      - ".github/workflows/ci-gateway.yaml"

concurrency:
  group: ci-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate:
    name: Validate Nginx Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Simule exactement entrypoint.sh avec des valeurs fictives mais cohérentes.
      # Toutes les variables utilisées dans nginx.conf et default.conf doivent
      # être listées ici ET dans entrypoint.sh — sinon envsubst les laisse
      # sous forme littérale ${VAR} et nginx -t échoue avec "emerg".
      - name: Validate Nginx config with envsubst
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/gateway/nginx:/etc/nginx/src:ro \
            -e PORT=8080 \
            -e MONOLITH_URL=ecom-watch.onrender.com \
            -e AUTH_SERVICE_HOST=ecom-watch-auth.onrender.com \
            -e ORDER_SERVICE_HOST=ecom-watch-order.onrender.com \
            -e PRODUCT_SERVICE_HOST=ecom-watch-product.onrender.com \
            -e PAYMENT_SERVICE_HOST=ecom-watch-payment.onrender.com \
            -e CART_SERVICE_HOST=ecom-watch-cart.onrender.com \
            -e ADMIN_SERVICE_HOST=ecom-watch-admin.onrender.com \
            -e NOTIFICATION_SERVICE_HOST=ecom-watch-notification.onrender.com \
            -e FRONTEND_DOMAIN=ecomwatch.vercel.app \
            nginx:1.25-alpine sh -c '
              set -e

              mkdir -p /tmp/nginx/conf.d

              # Simulation exacte de entrypoint.sh — même liste de variables
              envsubst "${PORT} ${MONOLITH_URL} ${AUTH_SERVICE_HOST} ${ORDER_SERVICE_HOST} ${PRODUCT_SERVICE_HOST} ${PAYMENT_SERVICE_HOST} ${CART_SERVICE_HOST} ${ADMIN_SERVICE_HOST} ${NOTIFICATION_SERVICE_HOST} ${FRONTEND_DOMAIN}" \
                < /etc/nginx/src/nginx.conf > /tmp/nginx/nginx.conf

              envsubst "${PORT} ${MONOLITH_URL} ${AUTH_SERVICE_HOST} ${ORDER_SERVICE_HOST} ${PRODUCT_SERVICE_HOST} ${PAYMENT_SERVICE_HOST} ${CART_SERVICE_HOST} ${ADMIN_SERVICE_HOST} ${NOTIFICATION_SERVICE_HOST} ${FRONTEND_DOMAIN}" \
                < /etc/nginx/src/conf.d/default.conf > /tmp/nginx/conf.d/default.conf

              cp /etc/nginx/src/conf.d/proxy_params.conf /tmp/nginx/conf.d/proxy_params.conf

              # Vérifie qu il ne reste aucune variable non substituée
              if grep -r "\${" /tmp/nginx/; then
                echo "ERREUR : des variables non substituées sont présentes dans la config"
                exit 1
              fi

              nginx -t -c /tmp/nginx/nginx.conf
              echo "Config Nginx valide"
            '

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          file: ./gateway/docker/Dockerfile
          push: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
          tags: ecom-watch-gateway:ci