# ================================================================
# CI — API Gateway
#
# Valide la configuration Nginx avec nginx -t en simulant
# exactement ce que fait entrypoint.sh en production.
# ================================================================

name: CI — Gateway

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "gateway/**"
      - ".github/workflows/ci-gateway.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "gateway/**"

concurrency:
  group: ci-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:

  validate:
    name: Validate Nginx Config
    runs-on: ubuntu-latest

    container:
      image: nginx:1.25-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install envsubst
        run: apk add --no-cache gettext

      # Simule exactement entrypoint.sh avec des valeurs fictives.
      # Si nginx -t échoue ici, il échouerait aussi au démarrage Render.
      - name: Validate nginx configuration
        run: |
          mkdir -p /tmp/nginx/conf.d

          envsubst '${PORT} ${AUTH_SERVICE_HOST} ${ORDER_SERVICE_HOST} ${PRODUCT_SERVICE_HOST} ${PAYMENT_SERVICE_HOST} ${CART_SERVICE_HOST} ${FRONTEND_DOMAIN}' \
            < gateway/nginx/nginx.conf > /tmp/nginx/nginx.conf

          envsubst '${PORT} ${AUTH_SERVICE_HOST} ${ORDER_SERVICE_HOST} ${PRODUCT_SERVICE_HOST} ${PAYMENT_SERVICE_HOST} ${CART_SERVICE_HOST} ${FRONTEND_DOMAIN}' \
            < gateway/nginx/conf.d/default.conf > /tmp/nginx/conf.d/default.conf

          cp gateway/nginx/conf.d/proxy_params.conf /tmp/nginx/conf.d/proxy_params.conf

          nginx -t -c /tmp/nginx/nginx.conf
          echo "Nginx config OK"
        env:
          PORT: "8080"
          AUTH_SERVICE_HOST: "auth.example.com"
          ORDER_SERVICE_HOST: "order.example.com"
          PRODUCT_SERVICE_HOST: "product.example.com"
          PAYMENT_SERVICE_HOST: "payment.example.com"
          CART_SERVICE_HOST: "cart.example.com"
          FRONTEND_DOMAIN: "ecomwatch.vercel.app"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: gateway
          file: gateway/Dockerfile
          push: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
          tags: ecom-watch-gateway:ci