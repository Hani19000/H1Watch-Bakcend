# =============================================================================
# CI — cart-service
# Pipeline : lint → test → build Docker
# Les tests cart-service utilisent des mocks complets (pas de vraie DB).
# =============================================================================

name: CI — cart-service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/cart/**"
      - ".github/workflows/ci-cart.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/cart/**"
      - ".github/workflows/ci-cart.yaml"

concurrency:
  group: ci-cart-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cart
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/cart/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: services/cart
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/cart/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecom_watch_test
          REDIS_URL: redis://localhost:6379
          PRODUCT_SERVICE_URL: http://localhost:3003
          INTERNAL_PRODUCT_SECRET: ci-cart-internal-secret-not-for-production
          JWT_ACCESS_SECRET: ci-access-secret-not-for-production
          CLIENT_URL: http://localhost:5173

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build cart-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/cart
          file: ./services/cart/Dockerfile
          push: false
          cache-from: type=gha,scope=cart-service
          cache-to: type=gha,mode=max,scope=cart-service
          tags: ecom-watch-cart:ci