# ================================================================
# Paramètres proxy communs — inclus dans chaque location block.
#
# Ce fichier centralise les headers forwarded pour éviter toute
# divergence entre les services. Toute modification ici s'applique
# à l'ensemble du gateway.
# ================================================================

# ── Authentification ──────────────────────────────────────────────
# Transmet le JWT Bearer token à chaque service aval.
# Sans ce header, tous les middlewares `protect` retournent 401
# car req.headers.authorization est undefined côté service.
proxy_set_header Authorization      $http_authorization;

# ── Informations client réelles ───────────────────────────────────
# Indispensable derrière un Load Balancer (Render, Heroku) :
# sans ces headers, les services voient l'IP du proxy au lieu du client.
proxy_set_header X-Real-IP          $remote_addr;
proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto  $scheme;

# ── Traçabilité inter-services ────────────────────────────────────
# Identifiant unique par requête, généré par nginx.
# Permet de corréler les logs à travers tous les microservices.
proxy_set_header X-Request-ID       $request_id;

# ── Timeouts ─────────────────────────────────────────────────────
# Valeurs calibrées pour Render : cold start possible sur plan gratuit.
proxy_connect_timeout   10s;
proxy_send_timeout      60s;
proxy_read_timeout      60s;

# ── Keep-alive vers l'upstream ────────────────────────────────────
# HTTP/1.1 + Connection vide réutilise les connexions TCP (keepalive).
# Réduit la latence sur les routes à forte fréquence (/cart, /products).
proxy_http_version 1.1;
proxy_set_header Connection "";
