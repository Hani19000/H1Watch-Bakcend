# =============================================================================
# WORKFLOW : CD global — ECOM-WATCH Monorepo
#
# Le déploiement est désormais géré par service via des workflows dédiés :
#   cd-auth.yaml      → déploie auth-service si services/auth/** change
#   cd-products.yaml  → déploie product-service si services/products/** change
#   cd-order.yaml     → déploie order-service si services/order/** change
#   cd-payment.yaml   → déploie payment-service si services/payment/** change
#   cd-cart.yaml      → déploie cart-service si services/cart/** change
#   cd-gateway.yaml   → déploie le gateway si gateway/** change
#
# Ce fichier global ne déploie plus rien — le monolith a été supprimé.
# =============================================================================

name: CD — Global

on:
  push:
    branches: [main]

jobs:
  notice:
    name: Déploiement par service
    runs-on: ubuntu-latest
    steps:
      - name: Rappel architecture
        run: |
          echo "Le déploiement est géré par service via les workflows cd-*.yaml"
          echo "Chaque workflow se déclenche uniquement si les fichiers du service ont changé."