# =============================================================================
# WORKFLOW : CD — Monorepo (documentation)
#
# Le monolith a été supprimé. Ce workflow ne déclenche plus de déploiement.
#
# ARCHITECTURE DE DÉPLOIEMENT ACTUELLE :
# Chaque microservice dispose de son propre workflow CD, déclenché
# automatiquement par les paths: correspondant à son répertoire.
#
#   Service          Workflow                                Secret deploy hook
#   ─────────────────────────────────────────────────────────────────────────
#   Gateway          gateway/.github/workflows/cd-gateway.yaml  RENDER_GATEWAY_DEPLOY_HOOK
#   Auth             services/auth/.github/workflows/CD.yaml     RENDER_AUTH_DEPLOY_HOOK
#   Order            services/order/.github/workflows/cd.yaml    RENDER_ORDER_DEPLOY_HOOK
#   Products         services/products/.github/workflows/CD.yaml RENDER_PRODUCT_DEPLOY_HOOK
#   Payment          services/payment/.github/workflows/CD.yaml  RENDER_PAYMENT_DEPLOY_HOOK
#   Notification     services/notification/.github/workflows/CD.yaml  RENDER_NOTIFICATION_DEPLOY_HOOK
#   Cart             services/cart/.github/workflows/CD.yaml     RENDER_DEPLOY_HOOK_CART_URL
#   Admin            services/admin/.github/workflows/CD-admin.yaml   RENDER_ADMIN_DEPLOY_HOOK_URL
#
# POUR DÉCLENCHER UN DÉPLOIEMENT :
#   Modifier un fichier dans le répertoire du service cible et merger sur main.
#   Le CD correspondant se déclenche automatiquement sur les paths: configurés.
#
# SUPPRESSION DE CE FICHIER :
#   Ce fichier peut être supprimé du repository.
#   Il est conservé temporairement pour documenter la migration.
# =============================================================================

name: CD — Monorepo (obsolète)

on:
  # Désactivé — ce workflow ne fait rien.
  # Les déploiements sont gérés par les CD par service.
  workflow_dispatch:
    inputs:
      reason:
        description: 'Ce workflow est obsolète. Utiliser le CD du service concerné.'
        required: false

jobs:
  notice:
    name: Workflow obsolète
    runs-on: ubuntu-latest

    steps:
      - name: Redirection vers les CD par service
        run: |
          echo "Ce workflow CD racine est obsolète depuis la migration microservices."
          echo ""
          echo "Les déploiements sont désormais gérés par service :"
          echo "  • Gateway    → gateway/.github/workflows/cd-gateway.yaml"
          echo "  • Auth       → services/auth/.github/workflows/CD.yaml"
          echo "  • Order      → services/order/.github/workflows/cd.yaml"
          echo "  • Products   → services/products/.github/workflows/CD.yaml"
          echo "  • Payment    → services/payment/.github/workflows/CD.yaml"
          echo "  • Notif.     → services/notification/.github/workflows/CD.yaml"
          echo "  • Cart       → services/cart/.github/workflows/CD.yaml"
          echo "  • Admin      → services/admin/.github/workflows/CD-admin.yaml"
          echo ""
          echo "Chaque CD se déclenche automatiquement sur push dans main"
          echo "quand des fichiers du service correspondant sont modifiés."
