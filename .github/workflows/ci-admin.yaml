# =============================================================================
# CI — admin-service
#
# Déclenché uniquement si services/admin/** est modifié.
# Pipeline : lint → build Docker
#
# L'admin-service n'a pas de base de données propre — il agrège via HTTP.
# En CI, seul le démarrage du processus est vérifié (lint + image Docker valide).
# =============================================================================

name: CI — admin-service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/admin/**'
      - '.github/workflows/ci-admin.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/admin/**'
      - '.github/workflows/ci-admin.yaml'

concurrency:
  group: ci-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/admin/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: ESLint
        run: npm run lint

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (vérification sans push)
        uses: docker/build-push-action@v5
        with:
          context: services/admin
          file: services/admin/Dockerfile
          push: false
          build-args: NODE_ENV=production
          cache-from: type=gha,scope=admin-service
          cache-to: type=gha,mode=max,scope=admin-service