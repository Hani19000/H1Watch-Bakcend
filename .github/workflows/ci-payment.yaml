# =============================================================================
# CI — payment-service
# Pipeline : test → build Docker
# =============================================================================

name: CI — payment-service

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
    paths:
      - "services/payment/**"
      - ".github/workflows/ci-payment.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/payment/**"
      - ".github/workflows/ci-payment.yaml"

concurrency:
  group: ci-payment-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/payment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: services/payment/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:run
        env:
          NODE_ENV: test
          PORT: 3005
          JWT_ACCESS_SECRET: ci-test-secret-not-used-in-production
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_payment
          REDIS_URL: redis://localhost:6379

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build payment-service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment
          file: ./services/payment/Dockerfile
          push: false
          cache-from: type=gha,scope=payment-service
          cache-to: type=gha,mode=max,scope=payment-service
          tags: ecom-watch-payment:ci