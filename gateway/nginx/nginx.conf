worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/nginx_scgi_temp;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    # ── CORS : calcule l'origine autorisée depuis la requête ─────────────
    map $http_origin $cors_origin {
        default                              "";
        "~^https://.*\.vercel\.app$"         $http_origin;
        "~^https://${FRONTEND_DOMAIN}$"      $http_origin;
    }

    # ── Upstreams microservices ───────────────────────────────────────────

    upstream auth_service {
        server ${AUTH_SERVICE_HOST}:443;
        keepalive 16;
    }

    upstream order_service {
        server ${ORDER_SERVICE_HOST}:443;
        keepalive 16;
    }

    # Products, categories, promotions, inventory publique
    upstream product_service {
        server ${PRODUCT_SERVICE_HOST}:443;
        keepalive 16;
    }

    upstream cart_service {
        server ${CART_SERVICE_HOST}:443;
        keepalive 16;
    }

    upstream payment_service {
        server ${PAYMENT_SERVICE_HOST}:443;
        keepalive 16;
    }

    # Admin-service — dashboard, stats, inventaire admin, gestion utilisateurs
    upstream admin_service {
        server ${ADMIN_SERVICE_HOST}:443;
        keepalive 8;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=order:10m   rate=30r/m;
    # Strict sur la création de sessions Stripe (coût par appel).
    limit_req_zone $binary_remote_addr zone=payment:10m rate=10r/m;
    # Cart : ajouts/suppressions fréquents côté UI, limite permissive.
    limit_req_zone $binary_remote_addr zone=cart:10m    rate=120r/m;
    # Admin : faible volume, routes déjà protégées par JWT + rôle ADMIN.
    limit_req_zone $binary_remote_addr zone=admin:10m   rate=60r/m;

    include /tmp/nginx/conf.d/*.conf;
}