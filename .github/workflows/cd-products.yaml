# =============================================================================
# CD — products-service
# Pipeline : migrate (Neon) → deploy (Render)
#
# Architecture DB : une seule base Neon, chaque service = un schéma.
#
# Secrets GitHub requis :
#   NEON_DATABASE_URL           → même URL que les autres services
#   RENDER_PRODUCT_DEPLOY_HOOK  → Render dashboard → product-service → Settings → Deploy Hook
# =============================================================================

name: CD — products-service

on:
  push:
    branches: [main]
    paths:
      - "services/products/**"
      - ".github/workflows/cd-products.yaml"

concurrency:
  group: cd-products-production
  cancel-in-progress: false

jobs:

  migrate:
    name: Migrations Neon — schéma "product"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Vérification des secrets requis
        run: |
          missing=0

          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ]; then
            echo "❌ Secret manquant : NEON_DATABASE_URL"
            echo "   → Settings → Secrets and variables → Actions → New repository secret"
            missing=1
          fi

          if [ -z "${{ secrets.RENDER_PRODUCT_DEPLOY_HOOK }}" ]; then
            echo "❌ Secret manquant : RENDER_PRODUCT_DEPLOY_HOOK"
            echo "   → Render dashboard → product-service → Settings → Deploy Hook → Copy URL"
            missing=1
          fi

          if [ "$missing" = "1" ]; then
            echo ""
            echo "Configure les secrets manquants puis relance le workflow."
            exit 1
          fi

          echo "✅ Tous les secrets sont configurés."

      - name: Installation du client psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Vérification de la connexion Neon
        run: |
          psql "${{ secrets.NEON_DATABASE_URL }}" -c "SELECT current_user, version();"
          echo "Connexion Neon OK"

      - name: Activation de uuid-ossp
        run: |
          psql "${{ secrets.NEON_DATABASE_URL }}" \
            -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'

      - name: Création du schéma "product" (si inexistant)
        run: |
          psql "${{ secrets.NEON_DATABASE_URL }}" \
            -c 'CREATE SCHEMA IF NOT EXISTS product;'
          echo "Schéma product OK"

      - name: Migration 001 — tables et triggers
        run: |
          psql "${{ secrets.NEON_DATABASE_URL }}" \
            -v ON_ERROR_STOP=1 \
            -f services/products/migrations/001_product_schema.sql
          echo "Migration 001 OK"

      - name: Migration 002 — index de performance
        run: |
          psql "${{ secrets.NEON_DATABASE_URL }}" \
            -v ON_ERROR_STOP=1 \
            -f services/products/migrations/002_product_indexes.sql
          echo "Migration 002 OK"

  deploy:
    name: Deploy products-service → Render
    runs-on: ubuntu-latest
    needs: migrate
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI to complete
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build Docker Image"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          allowed-conclusions: success

      - name: Trigger Render Deploy Hook
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_PRODUCT_DEPLOY_HOOK }}")
          echo "Render responded with HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Wait for products-service health check
        run: |
          for i in $(seq 1 20); do
            HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 "https://ecom-watch-product.onrender.com/health" || echo "000")
            if [ "$HTTP" = "200" ]; then echo "✅ products-service live après $i tentative(s)"; exit 0; fi
            echo "Tentative $i/20 — HTTP $HTTP — prochaine dans 15s"
            sleep 15
          done
          echo "❌ Timeout : products-service ne répond pas"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "### products-service déployé ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Auteur** : ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY